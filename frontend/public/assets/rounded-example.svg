<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">Rounded activity example: before and after</title>
  <rect width="100%" height="100%" fill="#fff" />

  <!-- Left panel: Before -->
  <g transform="translate(40,20)">
    <rect width="520" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333" font-weight="600">Before</text>
    <!-- road/background -->
    <rect x="20" y="52" width="480" height="168" fill="#eef6fb" rx="6" />
    <!-- path with gap -->
    <path d="M40,170 C90,150 140,130 200,120 C240,114 280,112 320,120 C360,128 400,140 440,146" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <!-- short broken segment removed to create gap (we draw a faint dashed placeholder) -->
    <path d="M320,120 C340,126 360,140 380,146" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 8" opacity="0.22" />
    <!-- start and end markers -->
    <circle cx="40" cy="170" r="8" fill="#0b76ff" />
    <circle cx="440" cy="146" r="8" fill="#0b76ff" />
    <!-- small label -->
    <text x="28" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">Recorded route — last section missing</text>
  </g>

  <!-- Right panel: After -->
  <g transform="translate(620,20)">
    <rect width="520" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333" font-weight="600">After (Rounded Up)</text>
    <rect x="20" y="52" width="480" height="168" fill="#eef6fb" rx="6" />
    <!-- continuous path -->
    <path d="M40,170 C90,150 140,130 200,120 C240,114 280,112 320,120 C360,128 400,140 440,146" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <!-- added metres shown in accent color and dashed -->
    <path d="M440,146 C460,148 480,150 500,152" fill="none" stroke="#ff7a18" stroke-width="6" stroke-linecap="round" stroke-dasharray="6 6" />
    <circle cx="40" cy="170" r="8" fill="#0b76ff" />
    <circle cx="500" cy="152" r="8" fill="#ff7a18" />
    <text x="28" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">Recreated route — extra metres appended at average pace</text>
  </g>

</svg>
