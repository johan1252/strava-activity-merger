<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">Combine activities example</title>
  <rect width="100%" height="100%" fill="#fff" />

  <!-- Activity 1 -->
  <g transform="translate(40,20)">
    <rect width="320" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="16" y="30" font-family="Inter, Arial, sans-serif" font-size="16" fill="#333" font-weight="600">Activity 1</text>
    <rect x="16" y="52" width="288" height="168" fill="#eef6fb" rx="6" />
  <path d="M36,170 L180,90" fill="none" stroke="#0b76ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="36" cy="170" r="6" fill="#0b76ff" />
  <circle cx="180" cy="90" r="6" fill="#0b76ff" />
  </g>

  <!-- Activity 2 -->
  <g transform="translate(400,20)">
    <rect width="320" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="16" y="30" font-family="Inter, Arial, sans-serif" font-size="16" fill="#333" font-weight="600">Activity 2</text>
    <rect x="16" y="52" width="288" height="168" fill="#eef6fb" rx="6" />
  <path d="M36,90 L180,170" fill="none" stroke="#0b76ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="36" cy="90" r="6" fill="#0b76ff" />
  <circle cx="180" cy="170" r="6" fill="#0b76ff" />
  </g>

  <!-- Combined activity -->
  <g transform="translate(760,20)">
    <rect width="320" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="16" y="30" font-family="Inter, Arial, sans-serif" font-size="16" fill="#333" font-weight="600">Combined</text>
    <rect x="16" y="52" width="288" height="168" fill="#eef6fb" rx="6" />
    <!-- merged path: Activity 1 (45° up) then Activity 2 (45° down) -->
  <path d="M36,170 L180,90 L280,170" fill="none" stroke="#0b76ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="36" cy="170" r="6" fill="#0b76ff" />
  <circle cx="280" cy="170" r="6" fill="#0b76ff" />
    <text x="24" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">New merged activity combining the two parts</text>
  </g>

</svg>
