<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">Rounded down activity example: before and after</title>
  <rect width="100%" height="100%" fill="#fff" />

  <!-- Left panel: Before (full route) -->
  <g transform="translate(40,20)">
    <rect width="520" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333" font-weight="600">Before</text>
    <rect x="20" y="52" width="480" height="168" fill="#eef6fb" rx="6" />
    <!-- continuous path -->
    <path d="M40,170 C90,150 140,130 200,120 C240,114 280,112 320,120 C360,128 400,140 440,146" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="40" cy="170" r="8" fill="#0b76ff" />
    <circle cx="440" cy="146" r="8" fill="#0b76ff" />
    <text x="28" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">Recorded route — full activity</text>
  </g>

  <!-- Right panel: After (Rounded Down) -->
  <g transform="translate(620,20)">
    <rect width="520" height="240" rx="10" ry="10" fill="#f8fafb" stroke="#e6eef6" />
    <text x="20" y="30" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333" font-weight="600">After (Rounded Down)</text>
    <rect x="20" y="52" width="480" height="168" fill="#eef6fb" rx="6" />
    <!-- truncated path: last metres removed (faded dashed placeholder shows removed part) -->
    <path d="M40,170 C90,150 140,130 200,120 C240,114 280,112 320,120" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M320,120 C350,126 380,134 410,140" fill="none" stroke="#0b76ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 8" opacity="0.22" />
    <!-- end marker now earlier -->
    <circle cx="40" cy="170" r="8" fill="#0b76ff" />
    <circle cx="320" cy="120" r="8" fill="#0b76ff" />
    <text x="28" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">Recreated route — last metres removed</text>
  </g>
</svg>
